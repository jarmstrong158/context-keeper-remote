name: Deploy

# Deploy to Cloudflare Workers on every push to main. Tests run first; if they
# fail the job stops before the deploy step ever runs.
# Documentation-only pushes (Markdown) are skipped — they don't change the Worker.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only the maintainer's repo has the Cloudflare deploy secrets. Self-hosters
    # who arrive via the "Deploy to Cloudflare" button deploy through Workers
    # Builds, not this workflow, so skip it on forks to avoid failing runs.
    if: github.repository == 'jarmstrong158/context-keeper-remote'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Wrangler 4.x requires Node >= 22; Node 20 fails `wrangler deploy`.
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Only reached if the test step above succeeded. Deploy the `production`
      # environment, which pins the maintainer's D1 database_id (see
      # wrangler.toml) so CI keeps deploying to the same database and Worker URL.
      # wrangler reads CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID from the
      # environment; they come from repo secrets of the same names and are never
      # printed.
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
