name: Deploy

# Deploy to Cloudflare Workers on every push to main. Tests run first; if they
# fail the job stops before the deploy step ever runs.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Only reached if the test step above succeeded. wrangler reads
      # CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID from the environment;
      # they come from repo secrets of the same names and are never printed.
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
